apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    # Wave 3: Ingress syncs last - depends on cert-manager CRDs and ClusterIssuer existing
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default

  source:
    repoURL: https://github.com/AppcraftHQ/k8s-api-deployment
    targetRevision: main
    path: infra/k8s/manifests/argocd-ingress

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
