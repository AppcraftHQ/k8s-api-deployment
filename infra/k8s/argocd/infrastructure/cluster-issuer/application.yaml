apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-issuer
  namespace: argocd
  annotations:
    # Wave 2: ClusterIssuer syncs after cert-manager CRDs are registered and ready
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  source:
    repoURL: https://github.com/AppcraftHQ/k8s-api-deployment
    targetRevision: main
    path: infra/k8s/manifests/cluster-issuer

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
