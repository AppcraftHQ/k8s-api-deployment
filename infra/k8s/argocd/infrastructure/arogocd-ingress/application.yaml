apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-ingress
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Ademayowa/k8s-api-deployment
    targetRevision: main
    path: infra/k8s/manifests/argocd-ingress

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
