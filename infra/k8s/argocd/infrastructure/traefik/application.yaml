apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 26.0.0
    helm:
      values: |
        service:
          type: LoadBalancer
        ports:
          websecure:
            tls:
              enabled: true
          metrics:
            port: 9100
            expose: true
            exposedPort: 9100
        providers:
          kubernetesCRD:
            allowCrossNamespace: false
            namespaces:
              - traefik
              - monitoring
              - dev-real-estate
              - argocd
          kubernetesIngress:
            enabled: true
            allowCrossNamespace: false
            namespaces:
              - traefik
              - monitoring
              - dev-real-estate
              - argocd
            publishedService:
              enabled: true
        metrics:
          prometheus:
            entryPoint: metrics
            service:
              enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
